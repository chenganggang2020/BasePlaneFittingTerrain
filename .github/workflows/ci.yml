name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: bash

      - name: Syntax check
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          for path in sorted(Path('.').glob('*.py')):
              py_compile.compile(str(path), doraise=True)
              print(f'compiled {path}')
          PY
        shell: bash

      - name: CLI smoke check
        run: |
          python run_complete_pipeline.py --help
          python run_paper_experiments.py --help
          python run_ablation_study.py --help
          python OutlierTerrainSimulator.py --help
          python reproduce_paper_figures.py --help
        shell: bash
